  <style>
    .card-flag   { font-size: 64px; line-height: 1; display: block; margin-bottom: 8px; }

                   border-radius: 99px; display: inline-block; margin: 6px 0; }
    .card-cap    { font-family: system-ui, sans-serif; font-size: 1rem; color: rgba(255,255,255,0.75); }

                   font-style: italic; font-size: 1rem; }
    #info-box    { display: flex; flex-direction: column; align-items: center;
                   justify-content: center; gap: 6px; transition: opacity 0.15s; }
    #info-box.flash { opacity: 0.2; }
    .btn         { display: block; margin: 12px auto 0; padding: 0.75rem 2rem;
                   background: rgba(255,255,255,0.15); color: white; border: 1px solid rgba(255,255,255,0.4);
                   border-radius: 12px; font-family: system-ui, sans-serif; font-size: 1rem;
                   cursor: pointer; transition: background 0.2s, transform 0.1s; }
    .btn:hover   { background: rgba(255,255,255,0.25); }
    .btn:active  { transform: scale(0.97); }
    .count       { font-family: system-ui, sans-serif; text-align: center; color: rgba(255,255,255,0.45);
                   font-size: 0.8rem; margin-top: 8px; }

    let picks = 0;

    function pick() {
      const box = document.getElementById('info-box');
      box.classList.add('flash');
      setTimeout(() => {
        const c = countries[Math.floor(Math.random() * countries.length)];
        box.innerHTML = `
          <span class="card-flag">${c.flag}</span>
          <div class="card-name">${c.name}</div>
          <span class="card-cont">${c.continent}</span>
          <div class="card-cap">Capital: <strong>${c.capital}</strong></div>
        `;
        box.classList.remove('flash');
        picks++;
        document.getElementById('count').textContent =
          picks + ' countr' + (picks === 1 ? 'y' : 'ies') + ' picked from ' + countries.length + ' total';
      }, 150);
    }
  </script>
