<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/x-icon" href="basic-rgb-atlas-god-vector.jpg">
     <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <title>Random Country</title>
  <style>
    .card-flag   { font-size: 64px; line-height: 1; display: block; margin-bottom: 8px; }
    .card-name   { font-family: system-ui, sans-serif; font-size: 2rem; font-weight: 700; color: white; }
    .card-cont   { font-size: 0.75rem; letter-spacing: 0.15em; text-transform: uppercase;
                   color: #cce; background: rgba(255,255,255,0.15); padding: 4px 14px;
                   border-radius: 99px; display: inline-block; margin: 6px 0; }
    .card-cap    { font-family: system-ui, sans-serif; font-size: 1rem; color: rgba(255,255,255,0.75); }
    .card-cap strong { color: white; font-weight: 500; }
    .placeholder { font-family: system-ui, sans-serif; color: rgba(255,255,255,0.4);
                   font-style: italic; font-size: 1rem; }
    #info-box    { display: flex; flex-direction: column; align-items: center;
                   justify-content: center; gap: 6px; transition: opacity 0.15s; }
    #info-box.flash { opacity: 0.2; }
    .btn         { display: block; margin: 12px auto 0; padding: 0.75rem 2rem;
                   background: rgba(255,255,255,0.15); color: white; border: 1px solid rgba(255,255,255,0.4);
                   border-radius: 12px; font-family: system-ui, sans-serif; font-size: 1rem;
                   cursor: pointer; transition: background 0.2s, transform 0.1s; }
    .btn:hover   { background: rgba(255,255,255,0.25); }
    .btn:active  { transform: scale(0.97); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .count       { font-family: system-ui, sans-serif; text-align: center; color: rgba(255,255,255,0.45);
                   font-size: 0.8rem; margin-top: 8px; }
  </style>
</head>
<body>
<div class="titlestyle">
    <img src="globe.png" alt="earth's globe" style="width:100px;height:100px;margin:20px;">
    <h1 style="font-family:Roboto; text-align:left; color:white; margin-left:8px; font-size:58px;">Facts about every country in the world</h1>
  </div>
  <div class="bar">
    <ul>
      <li><a style="font-family:'Trebuchet MS', sans-serif; font-size:24px;" href="index.html">Home</a></li>
      <li><a style="font-family:'Trebuchet MS', sans-serif; font-size:24px;" href="random.html">Random country</a></li>
      <li><a style="font-family:'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif; font-size:24px;" href="quiz.html">Take a quiz!</a></li>
      <li><a style="font-family:'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif; font-size:24px;" href="compare.html">Compare two countries</a></li>
      <li><a style="font-family:'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif; font-size:24px;" href="Distance.html">Find the distance between two points</a></li>
    </ul>
  </div>

  <h1 style="font-family:system-ui, sans-serif; color:white; text-align:center; margin: 16px 0 12px;">
    Here, you'll be able to select a country randomly
  </h1>

  <div id="info-box">
    <span class="placeholder">Loading countries…</span>
  </div>

  <button class="btn" id="pick-btn" onclick="pick()" disabled>&#8645; Random Country</button>
  <p class="count" id="count"></p>

  <script>
    let countries = [];
    let picks = 0;

    async function loadCountries() {
      try {
        const res = await fetch('db.json');
        if (!res.ok) throw new Error('HTTP ' + res.status);
        countries = await res.json();
        document.getElementById('info-box').innerHTML =
          '<span class="placeholder">Press the button to begin</span>';
        document.getElementById('pick-btn').disabled = false;
      } catch (err) {
        document.getElementById('info-box').innerHTML =
          '<span class="placeholder">Couldn\'t load db.json: ' + err.message + '</span>';
      }
    }

    function pick() {
      if (!countries.length) return;
      const box = document.getElementById('info-box');
      box.classList.add('flash');
      setTimeout(() => {
        const c = countries[Math.floor(Math.random() * countries.length)];
        box.innerHTML = `
          <span class="card-flag">${c.flag}</span>
          <div class="card-name">${c.name}</div>
          <span class="card-cont">${c.continent}</span>
          <span class="card-cont">${c.language}</span>
          <span class="card-cont">${c.currency}</span>
          <div class="card-cap">Capital: <strong>${c.capital}</strong></div>
        `;
        box.classList.remove('flash');
        picks++;
        document.getElementById('count').textContent =
          picks + ' countr' + (picks === 1 ? 'y' : 'ies') + ' picked from ' + countries.length + ' total';
      }, 150);
    }

    loadCountries();
  </script>
</body>
</html>
