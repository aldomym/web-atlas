<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Countries of the world</title>
</head>
<body>
    <div class="titlestyle">
    <img src="globe.png" alt="earth's globe" style="width:100px;height:100px;margin:20px;">
    <h1 style="font-family: Verdana, Geneva, Tahoma, sans-serif; text-align:left; color:white; margin-left:8px;">Facts about every country in the world</h1>
    </div>
    <h2 style="font-family: Verdana, Geneva, Tahoma, sans-serif; text-align:left; color:white; margin-left:8px; text-align:center"><b>Your interactive web atlas</b></h2>
    <p style="font-family: Verdana, Geneva, Tahoma, sans-serif; text-align:center; color:white;"><b>Select a country in the drop down menu to see facts about it!
        <br>
        Choose to see information about more than 200 countries and territories!
    </b></p>
    <select id="dropdown" name="Select a country">
    <option value="">Select a country</option>
    </select>
    <div id="info-box">
    <p style="font-family:Arial, Helvetica, sans-serif; color:white;">Select a country from the menu</p>
    </div>
<script>
 let data = [];

fetch('db.json')
  .then(res => res.json())
  .then(json => {
    data = json;
    const select = document.getElementById('dropdown');

    select.innerHTML = '<option value="">Select a country</option>';

    json.forEach(country => {
      const option = document.createElement('option');
      option.value = country.id;          // e.g. "AL"
      option.textContent = country.name;  // e.g. "Albania"
      select.appendChild(option);
    });
  });

document.getElementById('dropdown').addEventListener('change', function () {
  const box = document.getElementById('info-box');
  const item = data.find(c => c.id === this.value);

  if (!item) {
    box.innerHTML = '<p style="font-family:Arial, Helvetica, sans-serif; color:white;">Select a country from the menu</p>';
    return;
  }

  box.innerHTML = `
  <div style="display:flex; align-items:flex-start; gap:20px;">
    <div>
  <p style="font-family:Arial, Helvetica, sans-serif; font-size:24px; color:white; text-align:center"><strong>ISO Code:</strong> ${item.id}</p>
  <p style="font-family:Arial, Helvetica, sans-serif; font-size:24px; color:white; text-align:center""><strong>Country:</strong> ${item.name}</p>
  <p style="font-family:Arial, Helvetica, sans-serif; font-size:24px; color:white; text-align:center""><strong>Continent:</strong> ${item.continent}</p>
  <p style="font-family:Arial, Helvetica, sans-serif; font-size:24px; color:white; text-align:center""><strong>Capital:</strong> ${item.capital}</p>
  <p style="font-family:Arial, Helvetica, sans-serif; font-size:24px; color:white; text-align:center""><strong>Flag:</strong> ${item.flag ?? ""}</p>
</div>
    ${item.image ? `<img src="${item.image}" alt="${item.name}" style="width:300px; height:auto; border-radius:8px; margin:4px;">` : ""}
  </div>

  `;
});
</script>
</body>
</html>
