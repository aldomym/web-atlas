<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/x-icon" href="basic-rgb-atlas-god-vector.jpg">
  <title>Compare Countries</title>
  <style>
    .compare-wrap {
      display: flex;
      gap: 16px;
      margin: 16px;
      align-items: flex-start;
      flex-wrap: wrap;
    }

    .compare-panel {
      flex: 1;
      min-width: 220px;
    }

    .compare-panel select {
      width: 100%;
      margin: 0 0 10px 0;
    }

    .country-card {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.3);
      box-shadow:
        0 8px 32px rgba(0, 0, 0, 0.1),
        inset 0 1px 0 rgba(255, 255, 255, 0.5),
        inset 0 -1px 0 rgba(255, 255, 255, 0.1),
        inset 0 0 10px 5px rgba(255, 255, 255, 0.5);
      padding: 24px 16px;
      text-align: center;
      min-height: 260px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .country-card .card-flag   { font-size: 64px; line-height: 1; display: block; margin-bottom: 6px; }
    .country-card .card-name   { font-family: system-ui, sans-serif; font-size: 1.6rem; font-weight: 700; color: white; }
    .country-card .card-cont   {
      font-size: 0.7rem; letter-spacing: 0.15em; text-transform: uppercase;
      color: #cce; background: rgba(255,255,255,0.15); padding: 3px 12px;
      border-radius: 99px; display: inline-block;
    }
    .country-card .card-cap    { font-family: system-ui, sans-serif; font-size: 0.95rem; color: rgba(255,255,255,0.75); }
    .country-card .card-cap strong { color: white; font-weight: 500; }
    .country-card .placeholder { color: rgba(255,255,255,0.35); font-family: system-ui, sans-serif; font-style: italic; }

    .vs-divider {
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, sans-serif;
      font-size: 1.6rem;
      font-weight: 700;
      color: white;
      padding-top: 48px;
      opacity: 0.5;
      flex-shrink: 0;
    }

    .fact-table {
      width: 100%;
      margin-top: 16px;
      border-collapse: collapse;
      font-family: system-ui, sans-serif;
      font-size: 0.9rem;
      color: white;
    }
    .fact-table td {
      padding: 8px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .fact-table td:first-child {
      color: rgba(255,255,255,0.55);
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      white-space: nowrap;
    }
    .fact-table td:last-child {
      text-align: right;
      font-weight: 500;
    }

    .shared-row {
      margin: 0 16px 16px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 16px;
      padding: 16px 24px;
      font-family: system-ui, sans-serif;
      font-size: 0.9rem;
      color: white;
      display: none;
    }
    .shared-row.visible { display: block; }
    .shared-row h3 {
      margin: 0 0 10px;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: rgba(255,255,255,0.5);
    }
    .shared-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .badge {
      background: rgba(255,255,255,0.15);
      border-radius: 99px;
      padding: 4px 14px;
      font-size: 0.8rem;
    }
    .badge.same { background: rgba(100,220,150,0.25); }
    .no-shared  { color: rgba(255,255,255,0.4); font-style: italic; }

    @media (max-width: 600px) {
      .vs-divider { padding-top: 0; }
    }
  </style>
</head>
<body>

  <div class="bar">
    <ul>
      <li><a style="font-family:'Trebuchet MS', sans-serif; font-size:24px;" href="index.html">Home</a></li>
      <li><a style="font-family:'Trebuchet MS', sans-serif; font-size:24px;" href="random.html">Random country</a></li>
      <li><a style="font-family:'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif; font-size:24px;" href="quiz.html">Take a quiz!</a></li>
      <li><a style="font-family:'Trebuchet MS', sans-serif; font-size:24px;" href="compare.html">Compare</a></li>
    </ul>
  </div>

  <h1 style="font-family:system-ui, sans-serif; color:white; text-align:center; margin: 16px 0 12px;">
    Compare two countries
  </h1>

  <div class="compare-wrap">
    <div class="compare-panel">
      <select id="select-a" onchange="render()">
        <option value="">— Pick a country —</option>
      </select>
      <div class="country-card" id="card-a">
        <span class="placeholder">Select a country above</span>
      </div>
    </div>

    <div class="vs-divider">VS</div>

    <div class="compare-panel">
      <select id="select-b" onchange="render()">
        <option value="">— Pick a country —</option>
      </select>
      <div class="country-card" id="card-b">
        <span class="placeholder">Select a country above</span>
      </div>
    </div>
  </div>

  <div class="shared-row" id="shared-row">
    <h3>What they have in common</h3>
    <div class="shared-badges" id="shared-badges"></div>
  </div>

  <script src="comparing.js"></script>
</body>
</html>
