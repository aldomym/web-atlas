<head>

    <title>Take a quiz!</title>

<style>
#quiz{
    margin:0 auto;
    max-width: 340px;
    width: 1000px;
  height: 360px;
  background: rgba(255, 255, 255, 0.15);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-radius: 20px;
  border: 1px solid rgba(255, 255, 255, 0.3);
  box-shadow: 
    0 8px 32px rgba(0, 0, 0, 0.1),
    inset 0 1px 0 rgba(255, 255, 255, 0.5),
    inset 0 -1px 0 rgba(255, 255, 255, 0.1),
    inset 0 0 20px 10px rgba(255, 255, 255, 1);
  position: relative;
  overflow: hidden;
  padding:22px;
  margin-top:12px;
}
#question{
    margin-bottom:15px;
    font-family:system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
    font-weight: bold;
    color:white;
    font-size:18px;
}
button {
  display: flexbox;
  margin: 4px;
  padding: 10px 20px;
  background-color: white;
  color: black;
  border: solid 1px black;
  cursor: pointer;
}

button:hover {
  background-color: black;
  color:white;
}
</style>

    <div class="titlestyle">

  </div>
    <div class="bar">
  <ul>

   <li><a style="font-family:'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif; font-size:24px;" href="compare.html">Compare two countries</a></li>

  </div>
